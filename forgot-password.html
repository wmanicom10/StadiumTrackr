<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <title>Forgot Password - StadiumTrackr</title>
        <link rel="stylesheet" href="/css/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close" />
    </head>

    <body>

        <!-- Main Content -->
        <div id="content-wrapper">

            <div id="forgot-password-overlay"></div>

            <main>

                <div id="forgot-password-menu">
                    <div id="forgot-password-menu-header">
                        <h2>Forgot Password</h2>
                    </div>
                    <p>Enter your email and we'll send you a link to reset your password</p>
                    <div id="forgot-password-email-container">
                        <input type="text" placeholder="Enter your email" id="forgot-password-email" aria-label="Enter your email">
                    </div>
                    <div id="forgot-password-buttons">
                        <button id="forgot-password-send-button">Send Link</button>
                    </div>
                </div>

            </main>
            
        </div>

        <!-- Scripts -->
        <script type="module" src="/scripts/pages/forgot-password-script.js"></script>
        
    </body>
</html>
