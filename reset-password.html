<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <title>StadiumTrackr - Reset Password</title>
        <link rel="stylesheet" href="/css/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close" />
    </head>

    <body>

        <!-- Main Content -->
        <div id="content-wrapper">

            <div id="reset-password-overlay"></div>

            <main>

                <div id="reset-password-menu">
                    <div id="reset-password-menu-header">
                        <h2>Reset Password</h2>
                    </div>
                    <p id="reset-password-text"></p>
                    <div id="reset-password-password-container">
                        <input type="password" placeholder="Enter new password" id="reset-password-new-password">
                        <input type="password" placeholder="Confirm new password" id="reset-password-confirm-password">
                    </div>
                    <div id="reset-password-buttons">
                        <h3 id="reset-password-button">Reset Password</h3>
                    </div>
                </div>

            </main>
            
        </div>

        <!-- Scripts -->
        <script type="module" src="/scripts/pages/reset-password-script.js"></script>
        
    </body>
</html>
