<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <title>StadiumTrackr - Page Not Found</title>
        <link rel="stylesheet" href="/css/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close" />
        <script src="https://captcha.stadiumtrackr.com/assets/widget.js"></script>
        <script>
            const token = localStorage.getItem('token');
            if (token) {
                const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(atob(base64));
                if (payload.username) {
                    document.documentElement.classList.add('logged-in');
                } else {
                    document.documentElement.classList.add('logged-out');
                }
            } else {
                document.documentElement.classList.add('logged-out');
            }
        </script>
    </head>

    <body>

        <div id="overlay"></div>

        <!-- Main Content -->
         <div id="content-wrapper">

            <main>

                <div id="not-found-container">
                    <img src="/images/error/bruce-hooper.jpg" id="error-404-image">
                    <h2 id="error-header">404 - Page Not Found</h2>
                    <p id="error-description">The page you're looking for doesn't exist or has been moved. Try going back to the home page.</p>
                    <a id="go-back-button">Go Home</a>
                </div>

            </main>

        </div>

        <!-- Scripts -->
        <script>
            document.getElementById('go-back-button').href = document.documentElement.classList.contains('logged-in') ? 'user-home.html' : '/';
        </script>
        
    </body>
</html>
